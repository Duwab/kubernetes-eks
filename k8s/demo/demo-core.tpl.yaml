---
apiVersion: v1
kind: Namespace
metadata:
  name: demo
  # annotations:
  #   scheduler.alpha.kubernetes.io/node-selector: nodegroup-role=worker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: demo
  name: deployment-demo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: app-demo
  replicas: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-demo
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: alpha.eksctl.io/nodegroup-name
                    operator: In
                    values:
                      # - <node-group-name-from-cluster.yaml>
                      - eks-grp-1
      containers:
      - image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/demo/api:0.0.2
        imagePullPolicy: Always
        name: app-demo
        resources:
          requests:
            memory: "500Mi"
          limits:
            memory: "2Gi"
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  namespace: demo
  name: service-demo
spec:
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: NodePort
  selector:
    app.kubernetes.io/name: app-demo
