---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-2
  # annotations:
  #   scheduler.alpha.kubernetes.io/node-selector: feature=feature-2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: demo-2
  name: deployment-demo-2
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # The default value is 25%.
      # maxUnavailable is an optional field that specifies the maximum number of Pods that can be unavailable during the update process.
      # maxUnavailable: 20% # The value can be an absolute number (for example, 5) or a percentage of desired Pods (for example, 10%).
      maxUnavailable: 0
      # maxSurge is an optional field that specifies the maximum number of Pods that can be created over the desired number of Pods.
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app-demo-2
  replicas: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-demo-2
    spec:
      nodeSelector:
        feature: feature-2
      containers:
      - image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/demo/api:0.0.2
        imagePullPolicy: Always
        name: app-demo-2
        resources:
          requests:
            memory: "500Mi"
          limits:
            memory: "2Gi"
        ports:
        - containerPort: 3000
        startupProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 1
---
apiVersion: v1
kind: Service
metadata:
  namespace: demo-2
  name: service-demo-2
spec:
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: NodePort
  selector:
    app.kubernetes.io/name: app-demo-2
